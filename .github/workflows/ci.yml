# CI — offline build + test gate (fixes audit finding TEST-N1).
#
# Runs the exact pre-release command chain (npm ci -> typecheck -> build -> test) on every
# pull request and on pushes to master, on Ubuntu and Windows. The unit+integration suite is
# fully OFFLINE: it uses the mock runtime + mock embedder and mocks `electron`, so it needs no
# weights, no sidecar binaries, and no network — nothing here launches Electron.
#
# This is dev infrastructure only. It ships nothing to users, adds no telemetry/analytics, and
# performs no network egress beyond the npm registry install. It does NOT replace the
# HILBERTRAUM_* manual smoke matrix — that real-binary / real-model pre-release gate is a
# SEPARATE human step (see docs/packaging.md — the "Continuous integration (CI)" section and the
# "HILBERTRAUM_* manual harness matrix", audit M-A5); those smokes are env-gated and skip here.

name: CI

# Every PR is validated against its merge result; pushes to master give post-merge green +
# catch direct pushes. A branch pushed WITHOUT an open PR intentionally gets no CI — the PR is
# the gate (open a draft PR to run CI on a WIP branch).
on:
  pull_request:
  push:
    branches: [master]

# One in-flight run per ref. A new push to a branch/PR cancels the previous, still-running CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: these jobs only read the repo and run npm — nothing else. This matters most
# for fork PRs, where an unset (default) GITHUB_TOKEN scope would be handed to whatever code runs
# during npm ci / build / test. Grant more narrowly at the job level if a future step needs it.
permissions:
  contents: read

# Keep CI fast and free of network flakiness: skip the ~100 MB Electron platform-binary
# download (nothing here launches Electron) and short-circuit the repo's verify-electron
# postinstall (scripts/verify-electron.mjs early-exits on either of these). See packaging.md.
#
# COREPACK_ENABLE_DOWNLOAD_PROMPT: corepack fetches the pinned npm on first use; the prompt
# it would otherwise raise has no answer on a runner. Set workflow-wide, not per step,
# because the fetch happens on the first `npm` invocation, not at `corepack enable`.
env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
  HILBERTRAUM_SKIP_ELECTRON_CHECK: '1'
  COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      # Report every leg even if one fails — the ci-success gate below aggregates them
      # (a matrix job's `result` is success only when ALL legs succeeded).
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # BOTH ends of the supported range, because both were previously untested claims
        # (AUD-26): 22.x is the `engines.node >=22.5` floor the app promises to run on
        # (node:sqlite is a built-in that needs it), 24.x is what every release leg builds
        # AND runs the full suite under. CI gating only one of them leaves the other a
        # declaration nothing exercises.
        node: ['22.x', '24.x']

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # `engines.npm >= 11` + the `packageManager: npm@11.6.2` pin are only real policy if
      # the pinned npm is what actually installs. Node 22 bundles npm 10.9 (BELOW the repo's
      # own floor), so without this the floor was never exercised anywhere. Corepack ships
      # with Node and shims `npm` to the pinned version on every leg. Must run AFTER
      # setup-node (it shims the Node install this step just provisioned). The printed
      # versions are the evidence in the run log that the pin took effect.
      - name: Enable corepack (run the pinned npm, not the Node-bundled one)
        run: |
          corepack enable
          node -v
          npm -v

      - name: Install (lockfile-pinned, offline-capable)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # Single stable gate to mark as the branch-protection required status check. The matrix legs
  # publish as "build-and-test (ubuntu-latest, 22.x)" / "(windows-latest, 24.x)" / … — names that
  # shift whenever the OS labels or the Node list change; "ci-success" does not, so it stays
  # matched in branch protection. Never add a leg's own name as a required check.
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    steps:
      - name: Require every build-and-test leg to have succeeded
        run: |
          result='${{ needs.build-and-test.result }}'
          echo "build-and-test aggregate result: $result"
          test "$result" = "success"

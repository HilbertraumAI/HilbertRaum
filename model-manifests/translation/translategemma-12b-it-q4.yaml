  url: https://huggingface.co/mradermacher/translategemma-12b-it-GGUF/resolve/main/translategemma-12b-it.Q4_K_M.gguf?download=true
  sha256: b7aac4b4be7ab0c49b6556c29c4467e74313df7f1e95d9f9676bb2adf0afa528
  size_bytes: 7300794112
  license_url: https://ai.google.dev/gemma/terms
bundled_on_preconfigured_drive: false
# Availability-driven role (plan §2 D1, like reranker/transcriber/vision): no settings slot, no
# picker recommendation. recommendation_rank 0 + recommended_profiles [] keep it a manual, on-demand
# capability. selectModel refuses it ("used automatically"); the translation sidecar activates by
# presence via resolveModelByRole('translation') once the weight is installed + verified (TG-2+).
recommendation_rank: 0
recommended_profiles: []
# The O1 review is CLOSED and the in-app path APPROVED (notes below), but `status`
# DELIBERATELY stays `pending`: in this schema `approved` is the REDISTRIBUTION review a
# sold drive needs — assertCommercialDrive AND the build-commercial-drive scripts require
# `approved` for EVERY manifest on the drive, and `bundled_on_preconfigured_drive` is
# advisory/unused, so `pending` is the only mechanical guard keeping this model off a
# sellable drive until the flow-down checklist is implemented. Flipping to `approved`
# would ALSO drop the in-app license-acknowledgement checkbox (ModelDownloadInfo
# .licenseApproved → needsAck), which the compliance posture leans on. Flip only together
# with the flow-down artifacts + a license-class acknowledgement gate.
license_review:
  status: pending
  reviewed_by: comilionas (project owner)
  reviewed_at: "2026-07-10"
  notes: "O1 IN-APP REVIEW CLOSED — APPROVED 2026-07-10, scoped to the in-app, license-gated download path (owner Gemma Terms review 2026-07-10; the analysis is summarized in full in this note). The four provisions the approval rests on: (1) distribution flow-down (Terms §3.1 — enforceable use-restriction provision, a copy of the Terms, prominent modification notices, the verbatim Gemma notice) binds the DISTRIBUTOR of the weights, which for the in-app path is Hugging Face → the user (the app is the conduit: download behind the explicit license-acknowledgement checkbox with license_url = the Gemma Terms, NOT bundled, NOT auto-recommended); (2) commercial use is allowed (no non-commercial clause — only the Prohibited Use Policy + applicable law restrict use); (3) outputs are unencumbered (Terms §3.3: Google claims no rights in outputs — a user's translated document is theirs); (4) the Prohibited Use Policy is incorporated by reference and Google may UPDATE it — re-check at each commercial refresh. COMMERCIAL-DRIVE PRELOADING REMAINS A SEPARATE OPEN ITEM: preloading IS redistribution, so before any drive bundles this model the four-point flow-down checklist must be implemented — a copy of the Gemma Terms on the drive; the verbatim NOTICE line ('Gemma is provided under and subject to the Gemma Terms of Use found at ai.google.dev/gemma/terms.'); an enforceable use-restriction clause in the drive's sale terms; the quantization-provenance notice (the GGUF is a modified derivative — stating the quantization satisfies the prominent-notice duty). Third-party quantizer provenance: the GGUF is from mradermacher/translategemma-12b-it-GGUF (no Google QAT/GGUF and no Apache-2.0 variant exists) — same established-quantizer posture as the unsloth entries; community GGUFs inherit the Gemma license as Model Derivatives. Hash pinned via the LFS OID cross-checked with X-Linked-ETag (2026-07-05); re-verify with verify-models --generate after the first fetch. RUNTIME NOTE: a chat-parsing rework (llama.cpp PR #19419) regressed the --jinja embedded-template path for TranslateGemma (issue #20305, fix PR #20956 still open 2026-07-05) — the translation sidecar therefore must NOT use --jinja and formats the trained prompt in app code against the raw /completion endpoint (plan §1.1 / §2 D2)."

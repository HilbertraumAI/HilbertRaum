sha256: b7aac4b4be7ab0c49b6556c29c4467e74313df7f1e95d9f9676bb2adf0afa528
# Download source: mradermacher/translategemma-12b-it-GGUF — the de-facto standard community
# GGUF (created 2026-01-16; unsloth/bartowski/ggml-org/lmstudio-community/QuantFactory published
# nothing, verified via author-scoped HF API queries). The repo is PUBLIC (tree API + resolve

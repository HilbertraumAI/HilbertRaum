# Runtime sources — prebuilt llama.cpp sidecar binaries (Phase 12; GPU defaults Phase 14).
#
# The `llama-server` sidecar is NOT a model, so it lives here rather than in a model
# manifest. `fetch-runtime` reads this file, picks the build matching the host
# OS/arch (or --os/--arch/--backend overrides), downloads + SHA-256-verifies the release
# archive (.zip or .tar.gz), and extracts it into the build's extract_to dir. Archives
# that nest their binaries in a subfolder (the macOS/Linux tarballs) are flattened so
# llama-server lands at the extract_to root. After extraction a `.hilbertraum-runtime.json`
# install marker ({ version, backend, os, arch }) is written next to the binary so
# re-runs can skip idempotently — and so a version/backend change actually re-fetches.
#
# DEFAULT BACKEND = VULKAN-FIRST (Phase 14, docs/architecture.md GPU record). The win/linux
# Vulkan release archives are STANDALONE FULL BUILDS: they ship llama-server + every
# ggml-cpu-* variant library + the Vulkan backend, loaded dynamically (GGML_BACKEND_DL).
# On a machine with no usable Vulkan device the same binary simply runs on its bundled
# CPU backends — so the Vulkan build degrades to exactly the old CPU behavior on
# GPU-less machines, which is why it is safe as the default for an unknown laptop.
# (The Phase-12 assumption "a GPU build fails or runs worse on a non-GPU machine" was
# verified FALSE for Vulkan-the-archive against b9585.) The pure-CPU builds remain as a
# last-resort safety net, extracted to runtime/llama.cpp/<os>/cpu/ (the app's fallback
# ladder rung 3 — used only if the default binary itself cannot start). The macOS arm64
# build ships with Metal enabled by default upstream (already GPU; no cpu/ net needed).
#
# Ordering matters: with no --backend override, fetch-runtime and selectRuntimeBuild
# take the FIRST os/arch match — list the default (vulkan/metal) build first per OS.
# (os, arch, backend) triples must be unique (validated).
#
# Schema (validated by apps/desktop/src/shared/runtime-sources.ts validateRuntimeSources):
#   llama_cpp:
#     version: <pinned ggml-org/llama.cpp release tag>
#     builds:
#       - { os, arch, backend, url, sha256, extract_to }
#
# PINNED RELEASE: b9849 (2026-06-30, upstream commit 799fcc0) — BUMPED from b9585
# (2026-06-09) as the Qwen3.5 COMPATIBILITY GATE: the Qwen3.5 chat manifests
# (model-manifests/chat/qwen3.5-*) are a newer architecture that may not load on the
# old b9585 build. The sha256 values below are the OFFICIAL release-asset digests from
# the ggml-org/llama.cpp GitHub Releases API (the `digest` field, one per asset), the
# same five-asset product topology as b9585 (win vulkan + win cpu, mac arm64 metal,
# linux vulkan + linux cpu). The win-vulkan asset is confirmed by every TG smoke (it is the
# D:\ pin). The **win-cpu** asset was confirmed against a LOCAL RE-DOWNLOAD 2026-07-05
# (TG-6 CPU-safety-net attempt: fetched + SHA-256 == fa7d9d93…4352, exact). The mac/linux
# assets are NOT yet confirmed against a local re-download on this machine — that is the
# remaining REQUIRED manual smoke (BUILD_STATE "Qwen3.5 Unsloth wave"):
# fetch-runtime re-SHA-256-verifies each archive BEFORE extracting, so a wrong/changed
# digest deletes the archive and fails the run — a bad binary can never silently install.
# To bump again: pick a new tag from https://github.com/ggml-org/llama.cpp/releases,
# update version + per-OS asset URLs (asset names vary by release), capture each asset's
# real SHA-256 (release `digest` metadata or a local hash), and promote it here as a
# deliberate, reviewed change.

llama_cpp:
  version: b9849
  builds:
    - os: win
      arch: x64
      backend: vulkan
      url: https://github.com/ggml-org/llama.cpp/releases/download/b9849/llama-b9849-bin-win-vulkan-x64.zip
      sha256: ed6156dec5303748fdf13d0056c5fb29aa504210e01d949e72ce20e3d680e4d6
      extract_to: runtime/llama.cpp/win
    - os: win
      arch: x64
      backend: cpu
      url: https://github.com/ggml-org/llama.cpp/releases/download/b9849/llama-b9849-bin-win-cpu-x64.zip
      sha256: fa7d9d93fa86979c5b44ba176cadae1167b5b054d4c467d184d81def4d714352
      extract_to: runtime/llama.cpp/win/cpu
    - os: mac
      arch: arm64
      backend: metal
      url: https://github.com/ggml-org/llama.cpp/releases/download/b9849/llama-b9849-bin-macos-arm64.tar.gz
      sha256: fccd749707c0fb0bbcee1682a0097f0d7a6e4adb6ce7fc8c6151d9e1d4b3c830
      extract_to: runtime/llama.cpp/mac
    - os: linux
      arch: x64
      backend: vulkan
      url: https://github.com/ggml-org/llama.cpp/releases/download/b9849/llama-b9849-bin-ubuntu-vulkan-x64.tar.gz
      sha256: 0fb2491604cbc468321bcaaa56991cfbc27fb0ac58b9597fd290a81b86da06d4
      extract_to: runtime/llama.cpp/linux
    - os: linux
      arch: x64
      backend: cpu
      url: https://github.com/ggml-org/llama.cpp/releases/download/b9849/llama-b9849-bin-ubuntu-x64.tar.gz
      sha256: 9ce3b4db4535fd68efb272b7159ffbe0748884c2db3525e68ae4315ba2df2a4d
      extract_to: runtime/llama.cpp/linux/cpu

# SECOND SIDECAR FAMILY (Phase 36): whisper.cpp — the audio transcriber. ADDITIVE
# block; an app from before Phase 36 reads only `llama_cpp:` and ignores this
# (verified forward-compatibility, wave-3 plan §9). Same schema, own pinned tag.
#
# PINNED RELEASE: v1.8.6 (2026-06-02). Inspected 2026-06-11 (R-W1): the upstream
# release ships PREBUILT BINARIES FOR WINDOWS ONLY (whisper-bin-x64.zip — a plain-CPU
# build whose Release/ folder contains whisper-cli.exe + whisper-server.exe + ggml
# DLLs; flattened on extraction) plus BLAS/CUDA variants and an Apple xcframework.
# There are NO prebuilt mac/linux CLI binaries — on those OSes the drive builder
# compiles the pinned tag from source (cmake; see docs/packaging.md) into
# runtime/whisper.cpp/<os>/, writing the .hilbertraum-runtime.json marker by hand or via
# fetch-runtime's marker step. CPU-only by design (E5/reranker precedent: ASR is a
# batch job; GPU whisper would be a later opt-in, never a default risk).
# The sha256 below was computed from a fresh download on 2026-06-11.
whisper_cpp:
  version: v1.8.6
  builds:
    - os: win
      arch: x64
      backend: cpu
      url: https://github.com/ggml-org/whisper.cpp/releases/download/v1.8.6/whisper-bin-x64.zip
      sha256: b07ea0b1b4115a38e1a7b07debf581f0b77d999925f8acb8f39d322b0ba0a822
      extract_to: runtime/whisper.cpp/win

# OCR LANGUAGE DATA (Phase 38, D32): a NEW ASSET CLASS on this yaml — plain verified
# files, no extraction, no per-OS variance. ADDITIVE block (the whisper_cpp
# forward-compatibility contract). The drive carries ONLY these traineddata files;
# the tesseract.js worker + WASM core ship inside the app as pinned npm deps (R-O2).
#
# PINNED DATA: @tesseract.js-data/{deu,eng}@1.0.0, variant 4.0.0_best_int — the
# INTEGERIZED tessdata_best (R-O3: the WASM core cannot run float `best` models, and
# best_int beat `fast` clearly on degraded German scans: 3 vs 7 misses of 104 words).
# Shipped AS the .gz tesseract.js reads natively (langPath + gzip:true — one hash,
# no decompression step in the scripts). Upstream license: Apache-2.0 (tesseract-ocr
# traineddata; reviewed in docs/model-policy.md). The sha256 values were computed
# from fresh downloads on 2026-06-11.
ocr:
  version: 4.0.0_best_int
  files:
    - lang: deu
      url: https://cdn.jsdelivr.net/npm/@tesseract.js-data/deu@1.0.0/4.0.0_best_int/deu.traineddata.gz
      sha256: 306c4280d0cbed46fbff727486bd43b92730181bae80f56941a091f363bdf28b
      dest: ocr/deu.traineddata.gz
    - lang: eng
      url: https://cdn.jsdelivr.net/npm/@tesseract.js-data/eng@1.0.0/4.0.0_best_int/eng.traineddata.gz
      sha256: 45b4cb346724ac1774f1c36f42f182b887bcdb28ebe63e6fff90ac41f3fcff91
      dest: ocr/eng.traineddata.gz

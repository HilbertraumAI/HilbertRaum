id: gemma4-31b-it-qat-q4
display_name: Gemma 4 31B Instruct QAT Q4
family: gemma4
role: chat
format: gguf
runtime: llama_cpp
license: apache-2.0
size_on_disk_gb: 17.7
# ESTIMATED from file size + the catalog's Q4 overhead pattern (no measured RSS yet — the
# Gemma 4 QAT wave recalibrates from peak RSS after the b9849 smoke, like Phase-29 did).
# Same tier as qwen3.5-27b (17.6 GB → min 24 / rec 32) and qwen3-30b-a3b (18.6 GB → min 24).
recommended_min_ram_gb: 24
recommended_ram_gb: 32
# Default 0: NOT auto-recommended, and the WEAKEST case of the Gemma 4 QAT wave: a 31B DENSE
# decode on CPU will be the slowest in the catalog (the Qwen3 14B dense problem, scaled up) —
# it is mainly interesting with Vulkan/Metal GPU offload on 32 GB machines, where it is the
# quality ceiling of the Apache-2.0 Gemma line. Opt-in high-end challenger to qwen3.5-27b and
# gemma4-26b-a4b (which likely delivers similar quality at ~4x the CPU speed and 3 GB less
# disk — the eval decides). Promote with a real `recommendation_rank` only after the local
# German/English grounded-QA eval + b9849 smoke (model-benchmarks.md §9) — public scores do
# not count.
recommendation_rank: 0
recommended_context_tokens: 8192
# Gemma 4's chat template honours `enable_thinking` — verified live on the 12B (Phase-29 run #2,
# tests/manual/gemma-thinking.test.ts). Assumed template-family-wide; VERIFY per size by smoke
# before relying on Deep.
supports_thinking_mode: true
supports_tools: false
local_path: models/chat/gemma4-31b-it-qat-q4.gguf

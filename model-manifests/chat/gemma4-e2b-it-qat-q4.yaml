id: gemma4-e2b-it-qat-q4
display_name: Gemma 4 E2B Instruct QAT Q4
family: gemma4
role: chat
format: gguf
runtime: llama_cpp
license: apache-2.0
size_on_disk_gb: 3.3
# ESTIMATED from file size + the catalog's Q4 overhead pattern (no measured RSS yet — the
# Gemma 4 QAT wave recalibrates from peak RSS after the b9849 smoke, like Phase-29 did).
# Hard min is the MODEL-ALONE floor (PROD-1); co-residency pressure lives in recommended_ram_gb.
# recommended_ram_gb deliberately sits on the small-tier 16 floor (qwen3-4b/qwen3.5-4b/8B tier all
# share 16): a UNIQUE lower value would make this the only "comfortable fit" at that RAM level and
# the preferRanked guard (empty ranked set → all fits) would auto-recommend a rank-0 model —
# caught by the wave-invariant test at ram=12 when this briefly said 12.
recommended_min_ram_gb: 8
recommended_ram_gb: 16
# Default 0: NOT auto-recommended. Low-end challenger to the 4B tier (qwen3-4b-instruct-q4 /
# qwen3.5-4b-ud-q4kxl) — the tier issue #53 wants a better weak-hardware pick for. E2B is a
# MatFormer effective-2B slice (~5B raw params, ~2B-class memory/compute footprint), 140+
# languages. Promote with a real `recommendation_rank` only after the local German/English
# grounded-QA eval + b9849 smoke (model-benchmarks.md §9) — public scores do not count.
recommendation_rank: 0
recommended_context_tokens: 8192
# Gemma 4's chat template honours `enable_thinking` — verified live on the 12B (Phase-29 run #2,
# tests/manual/gemma-thinking.test.ts). Assumed template-family-wide; VERIFY per size by smoke
# before relying on Deep.
supports_thinking_mode: true
supports_tools: false
local_path: models/chat/gemma4-e2b-it-qat-q4.gguf

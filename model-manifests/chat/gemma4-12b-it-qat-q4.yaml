# PROMOTED challenger (Phase 29, §5.4): beats the incumbent Qwen3 14B on EVERY axis in the
# first benchmark run — fewer hallucinations (1 vs 2/15), faster decode (3.0 vs 2.1 tg t/s,
# i7-1185G7 CPU), same EM/F1, same RAM. (Both are Apache-2.0 — the whole catalog is; the edge
# is quality + speed, not licence.)
# recommended_min_ram_gb dropped 16→14 from the measured ~10.6 GiB peak RSS;
# recommended_profiles stays [] (prod picker is RAM-best-fit); its 12-14B-tier win is applied via
# `recommendation_rank: 2` — the quality-aware picker (docs/model-benchmarks.md §6.2) prefers it
# over Qwen3 14B on 32 GB+ machines. High tier
# (Qwen3 14B class), 140+ languages. Vendor QAT **Q4_0** quantization, not Q4_K_M —
# quantization-aware trained, so higher quality than a naive Q4 at similar size. Needs
# llama.cpp ~b8607+; our pinned b9585 (2026-06-09) covers it (plan §3.1). TEXT-ONLY USE: the
# upstream repo also ships an mmproj vision file — we deliberately do not reference it.
# THINKING: Gemma 4's chat template honours `enable_thinking` (Deep streams real
# `reasoning_content`). `supports_thinking_mode` was FLIPPED to true (Phase-29 run #2): the
# thinking-quality check (tests/manual/gemma-thinking.test.ts) had Deep match Balanced 8/8 on
# reasoning items (incl. the snail/bat-ball/syllogism traps) with coherent chain-of-thought, so
# Deep is safe to offer. Caveat: both modes scored 100%, so the small set can't show Deep
# *strictly* helps — it shows Deep deliberates well and never regresses. The only thinking-capable
# challenger; the composer now offers "Thorough" for Gemma 4.

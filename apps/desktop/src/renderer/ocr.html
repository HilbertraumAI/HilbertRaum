<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Hidden OCR rasterizer window: renders PDF pages to PNG bytes for
      main-side text recognition. Same offline-first CSP as the main window — only
      same-origin resources; blob:/data: workers are what bundled pdfjs uses. The
      content below is the DEV policy and is REWRITTEN AT BUILD TIME from
      window-security.ts `buildMetaCsp(isDev, 'ocr')` by the csp-meta transform in
      electron.vite.config.ts (BE-2, ocr-audit 2026-07-18) — packaged builds bake the
      strict prod policy with no localhost.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; connect-src 'self' ws://localhost:* http://localhost:*; img-src 'self' data: blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'"
    />
    <title>OCR rasterizer</title>
  </head>
  <body>
    <script type="module" src="/ocr/main.ts"></script>
  </body>
</html>

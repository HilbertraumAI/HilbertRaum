<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Offline-first CSP: only same-origin resources. No remote origins are
      permitted, so the renderer cannot reach any cloud service. The localhost
      entries exist solely for the dev server's hot-reload. Phase 8 hardens this
      further via response headers.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; connect-src 'self' ws://localhost:* http://localhost:*; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private AI Drive Lite</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Offline-first CSP: only same-origin resources. No remote origins are
      permitted, so the renderer cannot reach any cloud service. The content below is
      the DEV policy (the localhost entries exist solely for Vite hot-reload) and is
      REWRITTEN AT BUILD TIME from window-security.ts `buildMetaCsp(isDev, 'index')` by
      the csp-meta transform in electron.vite.config.ts (BE-2, ocr-audit 2026-07-18) —
      packaged builds bake the strict prod policy with no localhost. The main process
      additionally enforces buildCsp() via response headers (measured load-bearing on
      packaged file:// loads — see docs/security-model.md).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; connect-src 'self' ws://localhost:* http://localhost:*; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <title>HilbertRaum</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>

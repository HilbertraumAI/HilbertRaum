<!-- Renderer favicon — the HilbertRaum brand mark: a sealed rounded square (the private
     room) holding a single teal dot at its exact centre (your data). The square ink is
     theme-adaptive via an internal prefers-color-scheme media query (dark ink #11171F on
     light, light ink #E8EDF2 on dark); the dot is always teal #57D0A4. Transparent
     background. Mirrors public/brand/favicon.svg; served same-origin so it satisfies the
     strict offline CSP. Source of the in-app mark assets: public/brand/. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>.sq{stroke:#11171f}@media (prefers-color-scheme:dark){.sq{stroke:#e8edf2}}</style>
  <rect class="sq" x="12" y="12" width="40" height="40" rx="12" fill="none" stroke-width="4.5"/>
  <circle cx="32" cy="32" r="5" fill="#57d0a4"/>
</svg>

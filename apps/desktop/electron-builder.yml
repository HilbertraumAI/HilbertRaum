# electron-builder configuration — Private AI Drive Lite (Phase 11, spec §12).
#
# Goal: a PORTABLE Windows build that launches from an external drive. macOS/Linux
# targets are defined for architecture parity (spec rule: keep all three supported),
# even though only Windows is produced on this dev machine.
#
# OFFLINE GUARANTEE: packaging adds NO runtime network dependency. The real backends
# spawn `llama-server` on 127.0.0.1 only (Phase 10). The only network is dev-time
# (Electron binary download R2, npm install R6).
#
# node:sqlite REQUIREMENT: the packaged main process needs Electron >= 37 (Node 22.x);
# `electron` is pinned to ^37 in devDependencies, so the bundled runtime has node:sqlite.
# A stripped/older runtime would lose it — do not downgrade Electron.
#
# Producing the actual artifact is a MANUAL step (R2/R5): see docs/packaging.md.

appId: org.privateaidrive.lite
productName: Private AI Drive Lite

directories:
  # buildResources holds icons etc. (optional; defaults are used if absent).
  buildResources: build
  output: release

# What goes inside app.asar. electron-builder ships production `dependencies`
# automatically (pdfjs-dist / mammoth / papaparse / yaml — the externalized parser libs),
# so the lazy require()s resolve at runtime. In this npm workspace those packages are
# HOISTED to the repo-root node_modules; `includeSubNodeModules: true` makes the collector
# follow hoisted/nested trees so mammoth's transitive deps come along too. ALWAYS smoke-test
# a PDF/DOCX/CSV import from the produced .exe — a missing externalized dep only surfaces at
# runtime, not in the green gate (see docs/packaging.md + BUILD_STATE R2).
files:
  - out/**/*
  - package.json
includeSubNodeModules: true
# No native addons (node:sqlite is built into Electron; parsers are pure-JS) → skip rebuild.
npmRebuild: false

# Model manifests are the ONLY model metadata in git. Ship them beside app.asar so the
# packaged main process finds them: resolveManifestsDir(app.getAppPath()) walks up from
# resources/app.asar and matches resources/model-manifests. PAID_MANIFESTS_DIR overrides.
# Weights + sidecar binaries are NEVER bundled — they live on the prepared drive.
extraResources:
  - from: ../../model-manifests
    to: model-manifests

# Asar keeps the app a single archive; node:sqlite + the parser libs work from it.
asar: true
# tesseract.js spawns its Node OCR worker via worker_threads, which loads the worker
# SCRIPT (and the WASM core it requires) through real filesystem reads — those cannot
# see inside the asar archive (Phase 38, R-O2). Unpack both packages; the engine
# rewrites app.asar → app.asar.unpacked in the resolved workerPath. Verify a real OCR
# run from the produced .exe at release acceptance (the green gate never packages).
asarUnpack:
  - 'node_modules/tesseract.js/**'
  - 'node_modules/tesseract.js-core/**'

# CODE SIGNING (Phase 13). Signing turns a scary OS gatekeeper dialog into a clean launch
# for a non-technical buyer; it is the single most important non-code task for the
# commercial drive. ALL signing secrets are supplied by ENV VARS on the build/CI machine
# and NEVER committed (CLAUDE.md hard rule). The green gate (typecheck/test/build) does NOT
# invoke electron-builder, so none of this runs in CI by default — it is a documented
# manual/CI build step (see docs/packaging.md). The unsigned DIY fallback ("Run anyway" /
# right-click Open) is documented in docs/troubleshooting.md.

win:
  target:
    - portable
  # signtoolOptions are read from env on the build machine:
  #   WIN_CSC_LINK              path/URL to the OV/EV .pfx (or base64) — NEVER in the repo
  #   WIN_CSC_KEY_PASSWORD      the .pfx password
  # An EV cert (hardware token / cloud HSM) builds SmartScreen reputation fastest. The
  # launcher (Start Private AI Drive.cmd) is a script and is not itself signed; the portable
  # .exe it spawns IS signed, which is what SmartScreen evaluates.
  signtoolOptions:
    signingHashAlgorithms:
      - sha256
    # certificateSubjectName / certificateSha1 can be set here for an EV token; left unset
    # so a .pfx supplied via WIN_CSC_LINK/WIN_CSC_KEY_PASSWORD is used.

# A single self-contained .exe — copy it onto the drive root next to the prepared layout
# and launch it with PAID_DRIVE_ROOT pointing at the drive (see docs/packaging.md).
portable:
  artifactName: PrivateAIDriveLite-${version}-portable.exe

mac:
  target:
    - dir
  category: public.app-category.productivity
  # macOS signing + notarization. Without notarization a USB-launched .app is quarantined
  # ("can't be opened / damaged"). Supplied via env on the build machine:
  #   CSC_LINK / CSC_KEY_PASSWORD          the "Developer ID Application" cert (.p12)
  #   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID   notarization credentials
  # hardenedRuntime + the entitlements file are required for notarization to pass.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # notarize: electron-builder auto-notarizes when the APPLE_* env vars are present and this
  # is not explicitly false. Set to false for an unsigned local/dev build.

linux:
  target:
    - AppImage
  category: Utility

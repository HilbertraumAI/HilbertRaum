# electron-builder configuration — HilbertRaum (Phase 11, spec §12).
#
# Goal: a PORTABLE Windows build that launches from an external drive. macOS/Linux
# targets are defined for architecture parity (spec rule: keep all three supported),
# even though only Windows is produced on this dev machine.
#
# OFFLINE GUARANTEE: packaging adds NO runtime network dependency. The real backends
# spawn `llama-server` on 127.0.0.1 only (Phase 10). The only network is dev-time
# (Electron binary download R2, npm install R6).
#
# node:sqlite REQUIREMENT: the packaged main process needs Electron >= 37 (Node 22.x);
# `electron` is pinned to ^37 in devDependencies, so the bundled runtime has node:sqlite.
# A stripped/older runtime would lose it — do not downgrade Electron.
#
# Producing the actual artifact is a MANUAL step (R2/R5): see docs/packaging.md.

appId: space.hilbertraum.app
productName: HilbertRaum
# electron-builder derives the per-platform executable/AppImage name from the npm package name,
# which in this monorepo is the scoped "@hilbertraum/desktop" → "@hilbertraumdesktop"; the '@' is
# rejected as an unsafe path char and the build fails (first seen on the linux AppImage target,
# and it now hits mac/win too since the desktop package was renamed to a scoped name). Pin an
# explicit, path-safe name for every platform. Keep in sync with productName.
executableName: HilbertRaum

# electron-builder 26 cannot auto-detect the Electron version in this npm workspace: `electron`
# is pinned as a RANGE (^37 in devDependencies) and is HOISTED to the repo-root node_modules,
# which eb — running from apps/desktop — does not resolve, so it errors on the range. Pin the
# exact installed version here. Keep in sync with the `electron` devDependency (currently ^37 →
# 37.10.3); bump when the installed Electron major/minor changes.
electronVersion: 37.10.3

directories:
  # buildResources holds icons etc. (optional; defaults are used if absent).
  buildResources: build
  output: release

# What goes inside app.asar. electron-builder ships production `dependencies`
# automatically (pdfjs-dist / mammoth / papaparse / yaml — the externalized parser libs),
# so the lazy require()s resolve at runtime. In this npm workspace those packages are
# HOISTED to the repo-root node_modules; `includeSubNodeModules: true` makes the collector
# follow hoisted/nested trees so mammoth's transitive deps come along too. ALWAYS smoke-test
# a PDF/DOCX/CSV import from the produced .exe — a missing externalized dep only surfaces at
# runtime, not in the green gate (see docs/packaging.md + BUILD_STATE R2).
files:
  - out/**/*
  # CODE-1 (full-audit 2026-07-12b): `npm run preview:build` / `screenshot` emit the dev-only
  # screenshot-verify preview harness (incl. staged demo chats) to out/preview/, and
  # `electron-vite build` clears only out/main|preload|renderer — so a local `npm run package`
  # after a screenshot run would fold the whole harness into app.asar. Nothing loads it at
  # runtime; keep it out. tests/integration/packaging.test.ts pins this negation.
  - '!out/preview/**'
  - package.json
  # L18 (audit-2026-06-13): `@napi-rs/canvas` is an OPTIONAL transitive dep of pdfjs-dist
  # — a platform-specific native `.node` (Skia) we never import (the PDF path uses the
  # hidden-window rasterizer, not node-canvas). `includeSubNodeModules: true` would
  # otherwise follow the hoisted tree and bundle the win32 `.node` into app.asar, breaking
  # the pure-JS / cross-OS portable posture (a Windows .node on a macOS/Linux drive).
  # Exclude every platform variant. tests/integration/packaging.test.ts asserts this stays.
  - '!**/node_modules/@napi-rs/canvas*/**'
  # streamdown hard-depends on mermaid (~136 MB unpacked with its cytoscape/d3/dagre/roughjs
  # chain), but the @streamdown/mermaid plugin is NOT installed, so none of it is ever imported —
  # Vite keeps it out of the renderer bundle, yet electron-builder would fold the whole chain into
  # app.asar (production deps). Dead weight on a runs-from-a-USB-drive artifact. Every negation
  # below is a package reachable in the apps/desktop production dependency graph ONLY via mermaid;
  # tests/integration/packaging.test.ts recomputes that from package-lock.json and fails if a
  # future dep starts needing one of these (remove that negation then) or if mermaid stops being
  # excluded. If the mermaid plugin is ever adopted, delete this block and its test.
  - '!**/node_modules/mermaid/**'
  - '!**/node_modules/@mermaid-js/**'
  - '!**/node_modules/cytoscape*/**'
  - '!**/node_modules/cose-base/**'
  - '!**/node_modules/layout-base/**'
  - '!**/node_modules/d3/**'
  - '!**/node_modules/d3-*/**'
  - '!**/node_modules/@types/d3*/**'
  - '!**/node_modules/@types/geojson/**'
  - '!**/node_modules/@types/trusted-types/**'
  - '!**/node_modules/delaunator/**'
  - '!**/node_modules/robust-predicates/**'
  - '!**/node_modules/internmap/**'
  - '!**/node_modules/dagre-d3-es/**'
  - '!**/node_modules/roughjs/**'
  - '!**/node_modules/hachure-fill/**'
  - '!**/node_modules/path-data-parser/**'
  - '!**/node_modules/points-on-curve/**'
  - '!**/node_modules/points-on-path/**'
  - '!**/node_modules/khroma/**'
  - '!**/node_modules/dompurify/**'
  - '!**/node_modules/es-toolkit/**'
  - '!**/node_modules/dayjs/**'
  - '!**/node_modules/lodash-es/**'
  - '!**/node_modules/uuid/**'
  - '!**/node_modules/stylis/**'
  - '!**/node_modules/ts-dedent/**'
  - '!**/node_modules/rw/**'
  - '!**/node_modules/iconv-lite/**'
  - '!**/node_modules/safer-buffer/**'
  - '!**/node_modules/import-meta-resolve/**'
  - '!**/node_modules/package-manager-detector/**'
  - '!**/node_modules/@braintree/**'
  - '!**/node_modules/@iconify/**'
  - '!**/node_modules/@antfu/**'
  - '!**/node_modules/@chevrotain/**'
  - '!**/node_modules/@upsetjs/**'
# NOTE: `includeSubNodeModules: true` was REMOVED in electron-builder 26 (it now errors as an
# unknown property). v26's reworked dependency collector already follows hoisted/nested
# node_modules trees by default, so mammoth's transitive deps still come along. If a hoisted
# externalized dep ever goes missing from app.asar, build from apps/desktop or disable hoisting
# (see docs/packaging.md "Portable build"). ALWAYS smoke-test a PDF/DOCX/CSV import + encrypted
# workspace from the produced .exe — a missing dep surfaces only at runtime.
# No native addons (node:sqlite is built into Electron; parsers are pure-JS) → skip rebuild.
npmRebuild: false

# Model manifests are the ONLY model metadata in git. Ship them beside app.asar so the
# packaged main process finds them: resolveManifestsDir(app.getAppPath()) walks up from
# resources/app.asar and matches resources/model-manifests. HILBERTRAUM_MANIFESTS_DIR overrides.
# Weights + sidecar binaries are NEVER bundled — they live on the prepared drive.
extraResources:
  - from: ../../model-manifests
    to: model-manifests
  # LIC-2 (full-audit 2026-07-12): third-party license notices for every npm package bundled
  # into app.asar / the Vite bundles (Apache-2.0 NOTICE preservation, MIT/BSD attribution,
  # KaTeX OFL fonts). Generated file — regenerate with
  # `node scripts/generate-third-party-notices.mjs`; tests/integration/third-party-notices.test.ts
  # fails the gate when it drifts from package-lock.json.
  - from: ../../THIRD-PARTY-NOTICES.md
    to: THIRD-PARTY-NOTICES.md

# Asar keeps the app a single archive; node:sqlite + the parser libs work from it.
asar: true
# tesseract.js spawns its Node OCR worker via worker_threads, which loads the worker
# SCRIPT (and the WASM core it requires) through real filesystem reads — those cannot
# see inside the asar archive (Phase 38, R-O2). Unpack both packages; the engine
# rewrites app.asar → app.asar.unpacked in the resolved workerPath. Verify a real OCR
# run from the produced .exe at release acceptance (the green gate never packages).
asarUnpack:
  - 'node_modules/tesseract.js/**'
  - 'node_modules/tesseract.js-core/**'

# CODE SIGNING (Phase 13). Signing turns a scary OS gatekeeper dialog into a clean launch
# for a non-technical buyer; it is the single most important non-code task for the
# commercial drive. ALL signing secrets are supplied by ENV VARS on the build/CI machine
# and NEVER committed (CLAUDE.md hard rule). The green gate (typecheck/test/build) does NOT
# invoke electron-builder, so none of this runs in CI by default — it is a documented
# manual/CI build step (see docs/packaging.md). The unsigned DIY fallback ("Run anyway" /
# right-click Open) is documented in docs/troubleshooting.md.

win:
  target:
    - portable
  # signtoolOptions are read from env on the build machine:
  #   WIN_CSC_LINK              path/URL to the OV/EV .pfx (or base64) — NEVER in the repo
  #   WIN_CSC_KEY_PASSWORD      the .pfx password
  # An EV cert (hardware token / cloud HSM) builds SmartScreen reputation fastest. The
  # launcher (Start HilbertRaum.cmd) is a script and is not itself signed; the portable
  # .exe it spawns IS signed, which is what SmartScreen evaluates.
  signtoolOptions:
    signingHashAlgorithms:
      - sha256
    # certificateSubjectName / certificateSha1 can be set here for an EV token; left unset
    # so a .pfx supplied via WIN_CSC_LINK/WIN_CSC_KEY_PASSWORD is used.

# A single self-contained .exe — copy it onto the drive root next to the prepared layout
# and launch it with HILBERTRAUM_DRIVE_ROOT pointing at the drive (see docs/packaging.md).
portable:
  artifactName: HilbertRaum-${version}-portable.exe

mac:
  target:
    - dir
  category: public.app-category.productivity
  # macOS signing + notarization. Without notarization a USB-launched .app is quarantined
  # ("can't be opened / damaged"). Supplied via env on the build machine:
  #   CSC_LINK / CSC_KEY_PASSWORD          the "Developer ID Application" cert (.p12)
  #   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID   notarization credentials
  # hardenedRuntime + the entitlements file are required for notarization to pass.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # notarize: electron-builder auto-notarizes when the APPLE_* env vars are present and this
  # is not explicitly false. Set to false for an unsigned local/dev build.

linux:
  target:
    - AppImage
  category: Utility
